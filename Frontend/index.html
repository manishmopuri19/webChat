<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet | Global Connection</title>
    <link rel="stylesheet" href="Css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-wrapper">
        <div class="silhouette-overlay"></div>
        <div class="liquid-glow"></div>
    </div>

    <form id="registrationForm">
        
    <div class="registration-container">
        <div class="glass-card">
            <div class="header-section">
                <h1 class="logo-text">Velvet</h1>
                <p class="tagline">Connect Globally. Chat Intimately.</p>
            </div>

            <form id="regForm">
                <div class="input-group">
                    <input id="name" type="text" required>
                    <label>Your Name</label>
                    <div class="bar"></div>
                </div>

                <div class="input-group">
                    <input id="mobile" type="tel" required>
                    <label>Mobile Number</label>
                    <div class="bar"></div>
                </div>

                <div class="input-group">
                    <input id="email" type="email" required>
                    <label>Digital Address</label>
                    <div class="bar"></div>
                </div>

                <div class="input-group">
                    <input id="password" type="password" required>
                    <label>Secret Key</label>
                    <div class="bar"></div>
                </div>

                <button type="submit" class="fluid-btn">
                    <span>Initialize Connection</span>
                    <div class="btn-glow"></div>
                </button>
            </form>

            <div class="footer-links">
                <p>Already bound? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>
    </form>

    <script>
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.liquid-glow');
            glow.style.left = e.pageX + 'px';
            glow.style.top = e.pageY + 'px';
        });
    </script>
    <script type="module" src="Scripts/Authentication.js"></script>
</body>
</html>
